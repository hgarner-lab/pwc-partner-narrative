<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PwC Partner Narrative Kits</title>
    <link rel="stylesheet" href="./styles.css?v=20260619-3" />
    <style>
      .brand { gap: 0 !important; align-items: center !important; }
      .brand-line, .brand-copy { display: none !important; }
      .pwc-mark {
        display: block !important;
        width: 156px !important;
        height: 84px !important;
        min-width: 156px !important;
        padding: 0 !important;
        margin: 0 !important;
        overflow: visible !important;
        background: transparent !important;
        flex: 0 0 156px !important;
      }
      .pwc-mark .pwc-text,
      .pwc-mark .block,
      .pwc-mark svg { display: none !important; }
      .pwc-mark img.pwc-real-logo {
        display: block !important;
        width: 156px !important;
        height: 84px !important;
        object-fit: contain !important;
        object-position: left center !important;
      }
      @media (max-width: 760px) {
        .pwc-mark { width: 126px !important; min-width: 126px !important; height: 68px !important; flex-basis: 126px !important; }
        .pwc-mark img.pwc-real-logo { width: 126px !important; height: 68px !important; }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app-shell"></div>
    <script>
      (function () {
        const logoSrc = "./assets/pwc-logo-clean-small.png?v=20260619-12";
        function applyLogo() {
          const mark = document.querySelector(".pwc-mark");
          if (!mark) return;
          mark.setAttribute("aria-label", "PwC");
          const img = mark.querySelector("img.pwc-real-logo");
          if (img) {
            if (!img.getAttribute("src") || !img.getAttribute("src").includes("pwc-logo-clean-small")) img.setAttribute("src", logoSrc);
            return;
          }
          mark.innerHTML = '<img class="pwc-real-logo" src="' + logoSrc + '" alt="PwC" />';
        }
        window.__forcePwcLogo = applyLogo;
        document.addEventListener("DOMContentLoaded", applyLogo);
        const timer = window.setInterval(applyLogo, 100);
        window.setTimeout(function () { window.clearInterval(timer); }, 10000);
        new MutationObserver(applyLogo).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
    <script type="module" src="./src/app.js?v=20260619-12"></script>
    <script type="module" src="./src/kit-interactions-safe.js?v=20260619-3"></script>
    <script type="module" src="./src/source-lanes.js?v=20260619-6"></script>
    <script type="module" src="./src/tdai-narratives.js?v=20260619-9"></script>
  </body>
</html>
